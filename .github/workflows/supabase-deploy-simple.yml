name: Deploy Database to Supabase (Simple)

on:
  workflow_dispatch: # Manual trigger only

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy directly
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Project ID: ${{ secrets.SUPABASE_PROJECT_ID }}"
          
          # Backup migrations first
          cp -r supabase/migrations /tmp/migrations-backup
          
          # Remove existing config and start fresh
          rm -rf supabase
          
          # Initialize new config
          supabase init
          
          # Update config with project ID
          sed -i 's/^project_id = .*/project_id = "${{ secrets.SUPABASE_PROJECT_ID }}"/' supabase/config.toml
          
          # Restore migrations
          mkdir -p supabase/migrations
          cp -r /tmp/migrations-backup/* supabase/migrations/
          
          # Link to project
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          
          # Repair migration history as suggested by Supabase CLI
          echo "Repairing migration history..."
          supabase migration repair --status reverted 20260303054353 || echo "Repair 1 failed, continuing..."
          supabase migration repair --status applied 20260316020000 || echo "Repair 2 failed, continuing..."
          supabase migration repair --status applied 20260316030000 || echo "Repair 3 failed, continuing..."
          supabase migration repair --status applied 20260316040000 || echo "Repair 4 failed, continuing..."
          supabase migration repair --status applied 20260317080000 || echo "Repair 5 failed, continuing..."
          
          # Ensure our migrations are still there
          cp -r /tmp/migrations-backup/* supabase/migrations/
          
          # Deploy our changes
          echo "Deploying new migrations..."
          supabase db push --yes
