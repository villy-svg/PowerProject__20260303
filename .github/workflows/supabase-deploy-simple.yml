name: Deploy Database to Supabase (Simple)

on:
  workflow_dispatch: # Manual trigger only

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy directly
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Project ID: ${{ secrets.SUPABASE_PROJECT_ID }}"
          
          # Remove existing config and start fresh
          rm -rf supabase
          
          # Initialize new config with project ID
          supabase init --no-project-id
          echo "project_id = \"${{ secrets.SUPABASE_PROJECT_ID }}\"" >> supabase/config.toml
          
          # Copy migrations back
          mkdir -p supabase/migrations
          
          # Link and deploy
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase db push --yes
