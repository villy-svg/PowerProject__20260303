name: Cold Storage Archive

on:
  schedule:
    - cron: '*/30 * * * *'  # Archival heartbeat (Staging & Prod)
  workflow_dispatch: {}     # Allows manual trigger

jobs:
  archive-staging:
    name: "Archive: Staging"
    if: vars.ARCHIVAL_CRON_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger Staging Archive
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/archive_response.json -w "%{http_code}" \
            -X POST "${{ secrets.SUPABASE_STAGING_URL }}/functions/v1/entity-archive" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_STAGING_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --max-time 58)

          echo "Staging Status: $HTTP_STATUS"
          cat /tmp/archive_response.json

          # 200 = fully done, 206 = partial (healthy — next heartbeat continues)
          # 207 = some pages failed → surface as GHA failure for alerting
          if [ "$HTTP_STATUS" -ne 200 ] && [ "$HTTP_STATUS" -ne 206 ]; then
            echo "Archive failed or had page-level errors. Status: $HTTP_STATUS"
            exit 1
          fi

          if [ "$HTTP_STATUS" -eq 206 ]; then
            echo "Partial run: more records remain. Will continue on next heartbeat."
          fi

  archive-production:
    name: "Archive: Production"
    if: vars.ARCHIVAL_CRON_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger Production Archive
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/archive_response.json -w "%{http_code}" \
            -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/entity-archive" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --max-time 58)

          echo "Production Status: $HTTP_STATUS"
          cat /tmp/archive_response.json

          if [ "$HTTP_STATUS" -ne 200 ] && [ "$HTTP_STATUS" -ne 206 ]; then
            echo "Archive failed or had page-level errors. Status: $HTTP_STATUS"
            exit 1
          fi

          if [ "$HTTP_STATUS" -eq 206 ]; then
            echo "Partial run: more records remain. Will continue on next heartbeat."
          fi
