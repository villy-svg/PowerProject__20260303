name: Deploy Database to Supabase (FINAL WORKING VERSION)

on:
  workflow_dispatch: # Manual trigger only

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Final Deploy - Working Solution
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "=== FINAL DEPLOYMENT SOLUTION ==="
          echo "Project ID: ${{ secrets.SUPABASE_PROJECT_ID }}"
          
          # Update config
          sed -i 's/project_id = "local-dev"/project_id = "${{ secrets.SUPABASE_PROJECT_ID }}"/' supabase/config.toml
          
          # Link and deploy with include-all
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          
          echo "Deploying with --include-all flag..."
          supabase db push --yes --include-all
          
          echo "Deployment completed!"
