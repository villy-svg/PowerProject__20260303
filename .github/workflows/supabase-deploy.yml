name: Deploy Database to Supabase

on:
  push:
    branches:
      - main # Runs every time you push to main
  workflow_dispatch: # This adds the manual "Run workflow" button in GitHub Actions

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Update project_id in config
        run: |
          echo "🔧 Updating project configuration..."
          sed -i 's/project_id = "local-dev"/project_id = "${{ secrets.SUPABASE_PROJECT_ID }}"/' supabase/config.toml
          echo "✅ Project ID updated"

      - name: Sync and deploy migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "🚀 Starting Supabase deployment..."
          
          # Link to project
          echo "📡 Linking to Supabase project..."
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          
          # Repair migration history for specific problematic migrations
          echo "🔧 Repairing migration history..."
          supabase migration repair --status reverted 20260303054353 || echo "⚠️ Repair 1 skipped"
          supabase migration repair --status applied 20260316020000 || echo "⚠️ Repair 2 skipped"
          supabase migration repair --status applied 20260316030000 || echo "⚠️ Repair 3 skipped"
          supabase migration repair --status applied 20260316040000 || echo "⚠️ Repair 4 skipped"
          supabase migration repair --status applied 20260317080000 || echo "⚠️ Repair 5 skipped"
          
          # Sync migrations with remote database
          echo "🔄 Syncing migrations with remote..."
          supabase db pull || echo "⚠️ Pull skipped, using local migrations"
          
          # Deploy all missing migrations
          echo "📤 Deploying all missing migrations..."
          supabase db push --yes --include-all
          
          echo "🎉 Deployment completed successfully!"
