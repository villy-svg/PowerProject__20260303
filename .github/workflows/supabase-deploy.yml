name: Deploy Database to Supabase

on:
  push:
    branches:
      - main # Runs every time you push to main
  workflow_dispatch: # This adds the manual "Run workflow" button in GitHub Actions

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Update project_id in config
        run: |
          # Update project_id to match the actual Supabase project
          sed -i 's/project_id = "local-dev"/project_id = "${{ secrets.SUPABASE_PROJECT_ID }}"/' supabase/config.toml
          echo "Updated project_id in config.toml"

      - name: Sync migrations with remote
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Project ID: ${{ secrets.SUPABASE_PROJECT_ID }}"
          
          # Link to project
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          
          # Repair migration history as suggested by Supabase CLI
          echo "Repairing migration history..."
          supabase migration repair --status reverted 20260303054353 || echo "Repair 1 failed, continuing..."
          
          # Pull existing migrations to sync with remote
          echo "Syncing migrations with remote database..."
          supabase db pull || echo "Pull failed, continuing with local migrations..."
          
          # Check migrations
          echo "Current migrations:"
          ls -la supabase/migrations/

      - name: Deploy migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Checking migrations..."
          ls -la supabase/migrations/
          
          echo "Deploying to Supabase..."
          supabase db push --yes --debug
