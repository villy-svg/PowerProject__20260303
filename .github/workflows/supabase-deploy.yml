name: Deploy Database to Supabase

on:
  push:
    branches:
      - main # Runs every time you push to main
  workflow_dispatch: # This adds the manual "Run workflow" button in GitHub Actions

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Update project_id in config
        run: |
          echo "Updating project_id in config.toml..."
          sed -i 's/project_id = "local-dev"/project_id = "${{ secrets.SUPABASE_PROJECT_ID }}"/' supabase/config.toml
          echo "Updated config:"
          cat supabase/config.toml | grep project_id

      - name: Validate Supabase connection
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Project ID: ${{ secrets.SUPABASE_PROJECT_ID }}"
          echo "Testing Supabase CLI connection..."
          
          # Test if we can access the project
          supabase projects list --output json || echo "Projects list failed"
          
          # Try to link with verbose output
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --debug || {
            echo "Link failed, trying alternative approach..."
            # Try without existing config
            rm -f supabase/config.toml
            supabase init --no-project-id
            echo "project_id = \"${{ secrets.SUPABASE_PROJECT_ID }}\"" > supabase/config.toml
            supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          }

      - name: Deploy migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Checking migrations..."
          ls -la supabase/migrations/
          
          echo "Deploying to Supabase..."
          supabase db push --yes --debug
