name: Deploy Database to Supabase

on:
  push:
    branches:
      - main # Runs every time you push to main
  workflow_dispatch: # This adds the manual "Run workflow" button in GitHub Actions

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Update project_id in config
        run: |
          echo "🔧 Updating project configuration..."
          sed -i 's/project_id = "local-dev"/project_id = "${{ secrets.SUPABASE_PROJECT_ID }}"/' supabase/config.toml
          echo "✅ Project ID updated"

      - name: Sync and deploy migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "🚀 Starting optimized Supabase deployment..."
          
          # Link to project
          echo "📡 Linking to Supabase project..."
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          
          # Consolidate repair operations to ensure sync
          echo "🔧 Ensuring migration history consistency..."
          # Repair problematic migration IDs if they exist in a broken state
          for m in 20260303054353 20260316020000 20260316030000 20260316040000 20260317080000; do
            supabase migration repair --status applied $m || echo "⚠️ Skip repair for $m"
          done
          
          # Deploy all missing migrations directly (avoids slow db pull)
          echo "📤 Pushing local migrations to remote..."
          supabase db push --yes --include-all
          
          echo "🎉 Deployment completed successfully!"
