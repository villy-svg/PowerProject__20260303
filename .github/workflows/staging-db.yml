name: Staging - Deploy Database

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Update staging project configuration
        run: |
          echo "🔧 Updating staging project configuration..."
          sed -i 's/project_id = "local-dev"/project_id = "${{ secrets.SUPABASE_STAGING_PROJECT_ID }}"/' supabase/config.toml
          echo "✅ Staging Project ID updated"

      - name: 🛡️ Secret Health Check
        env:
          ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_ID: ${{ secrets.SUPABASE_STAGING_PROJECT_ID }}
          DB_PASS: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}
        run: |
          echo "🔍 Checking Secret Status (Length check)..."
          if [ -z "$ACCESS_TOKEN" ]; then echo "❌ SUPABASE_ACCESS_TOKEN is EMPTY"; else echo "✅ SUPABASE_ACCESS_TOKEN is loadable"; fi
          if [ -z "$PROJECT_ID" ]; then echo "❌ SUPABASE_STAGING_PROJECT_ID is EMPTY"; else echo "✅ SUPABASE_STAGING_PROJECT_ID is loadable"; fi
          if [ -z "$DB_PASS" ]; then echo "❌ SUPABASE_STAGING_DB_PASSWORD is EMPTY"; else echo "✅ SUPABASE_STAGING_DB_PASSWORD is loadable"; fi

      - name: Sync and deploy migrations to Staging
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "🚀 Starting Staging Supabase deployment..."
          
          # Link to project FIRST
          echo "📡 Linking to Staging Supabase project..."
          supabase link --project-ref "${{ secrets.SUPABASE_STAGING_PROJECT_ID }}" --password "${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}"
          
          # Repair failed/renamed migration history
          echo "🛠️ Repairing migration history..."
          supabase migration repair --project-ref "${{ secrets.SUPABASE_STAGING_PROJECT_ID }}" --status reverted 20260315000000 || echo "Repair not needed or already done"
          
          # Deploy all migrations
          echo "📤 Pushing local migrations to staging..."
          supabase db push --yes --include-all
          
          echo "🎉 Staging Database Deployment completed!"
